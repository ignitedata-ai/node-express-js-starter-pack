services:
  postgres:
    image: postgres:16-alpine
    container_name: nextdecade-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nextdecade
      POSTGRES_PASSWORD: nextdecade
      POSTGRES_DB: nextdecade
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextdecade -d nextdecade"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    image: node:20-alpine
    container_name: nextdecade-server-dev
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npx prisma db push && npm run dev"
    env_file: ./server/.env
    environment:
      DATABASE_URL: postgresql://nextdecade:nextdecade@postgres:5432/nextdecade
      NODE_ENV: development
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  client:
    image: node:20-alpine
    container_name: nextdecade-client-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - server

volumes:
  postgres_data:
